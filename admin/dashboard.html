
<!DOCTYPE html>
<html>
<head>
<title>FutureMind Lab Admin</title>

<style>
body{
background:#080d1c;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#121a33;
padding:20px;
border-radius:15px;
display:inline-block;
margin:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
}

td,th{
padding:12px;
border:1px solid #444;
}

th{
background:#00d9ff;
color:#001;
}

</style>

</head>

<body>

<h1>FutureMind Lab Admin</h1>

<h2>Professional Sales Dashboard</h2>


<div class="card">
<h3>Total Orders</h3>
<h1 id="total">0</h1>
</div>


<div class="card">
<h3>Products Sold</h3>
<h1 id="products">0</h1>
</div>


<h2>Customer Orders</h2>


<table>

<tr>
<th>Name</th>
<th>Email</th>
<th>Product</th>
<th>Date</th>
</tr>

<tbody id="orders"></tbody>

</table>


<script>

fetch("../orders/orders.json")
.then(r=>r.json())
.then(data=>{

document.getElementById("total").innerHTML=data.length;

document.getElementById("products").innerHTML=data.length;


let table=document.getElementById("orders");


data.forEach(order=>{

table.innerHTML += `
<tr>
<td>${order.name}</td>
<td>${order.email}</td>
<td>${order.product}</td>
<td>${order.date}</td>
</tr>
`;

});

});


</script>


</body>
</html>
