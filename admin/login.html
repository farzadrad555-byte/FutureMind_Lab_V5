
<!DOCTYPE html>
<html>
<head>
<title>FutureMind Lab Admin Login</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.box{
background:white;
max-width:350px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px #ccc;
}

input,button{
width:100%;
padding:12px;
margin:10px 0;
}

button{
background:#222;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>

</div>


<script>

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;


fetch("/api/login",{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body:JSON.stringify({
        username:u,
        password:p
    })
})
.then(res=>res.json())
.then(data=>{

    if(data.status=="success"){

        localStorage.setItem(
            "admin_session",
            data.token
        );

        window.location="/admin/dashboard.html";

    }
    else{

        document.getElementById("msg").innerHTML =
        "Access Denied";

    }

});

}

</script>

</body>
</html>
